[general]
import = ["~/.cache/wal/colors-alacritty.toml"]

[window]
padding = { x = 8, y = 6 }
dynamic_padding = true

[font]
size = 11.0

[font.normal]
family = "FiraCode Nerd Font"
style = "Regular"

[cursor]
style = "Beam"
unfocused_hollow = true

[scrolling]
history = 10000
multiplier = 3

[selection]
save_to_clipboard = true

[terminal]
osc52 = "CopyPaste"
